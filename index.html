<!DOCTYPE html>
<html>
<head>
  <title>Photo Capture - Dr. Shroff Charity Eye Hospital</title>
  <style>
    body {
      display: flex;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      height: 100vh;
    }
    .sidebar {
      width: 200px;
      background: #ffffff;
      border-right: 2px solid #ddd;
      overflow-y: auto;
      padding: 10px;
    }
    .main {
      flex-grow: 1;
      padding: 20px;
      text-align: center;
    }
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    video, canvas {
      border: 4px solid #007bff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .capture-btn {
      background-color: #007bff;
      color: white;
    }
    .capture-btn:hover {
      background-color: #0056b3;
    }
    .thumb {
      margin-bottom: 15px;
      text-align: center;
    }
    .thumb img {
      width: 100%;
      border: 2px solid #ccc;
      border-radius: 6px;
    }
    .status {
      font-size: 12px;
      margin-top: 5px;
      font-weight: bold;
    }
    .not-uploaded {
      color: orange;
    }
    .uploaded {
      color: green;
    }
    .btn-group button {
      width: 80px;
      margin: 3px auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="sidebar" id="previewList">
  <!-- Thumbnails will appear here -->
</div>
<div class="main">
  <h2>📸 DR. SHROFF CHARITY EYE HOSPITAL</h2>
  <video id="video" width="400" height="300" autoplay playsinline></video><br>
  <button class="capture-btn" onclick="capturePhoto()">Capture Photo</button>
  <canvas id="canvas" width="400" height="420" style="display:none;"></canvas>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const previewList = document.getElementById('previewList');

  let latitude = "Not Available";
  let longitude = "Not Available";

  // Back camera start karo (environment = rear camera)
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",   // Back camera prefer
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("Camera access error: " + err.message + "\nBack camera allow karo ya device settings check karo.");
  });

  function getTimestamp() {
    const now = new Date();
    return new Intl.DateTimeFormat('en-IN', {
      timeZone: 'Asia/Kolkata',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    }).format(now).replace(",", "").replace(/[:/ ]/g, "_");
  }

  function getDisplayTimestamp() {
    const now = new Date();
    return new Intl.DateTimeFormat('en-IN', {
      timeZone: 'Asia/Kolkata',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    }).format(now);
  }

  function capturePhoto() {
    // Location fresh try karo button press pe
    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          latitude = pos.coords.latitude.toFixed(6);
          longitude = pos.coords.longitude.toFixed(6);
          console.log("Location updated:", latitude, longitude);
          proceedCapture();
        },
        err => {
          console.error("Location error:", err.message);
          alert("Location nahi mil pa rahi: " + err.message + "\nSettings mein Location ON karo (High Accuracy mode) aur permission allow karo.");
          proceedCapture();  // Location na mile to bhi photo capture
        },
        {
          enableHighAccuracy: true,    // GPS use karega
          timeout: 15000,              // 15 seconds max wait
          maximumAge: 0                // Purani cached location mat lo
        }
      );
    } else {
      proceedCapture();
    }
  }

  function proceedCapture() {
    const timestamp = getTimestamp();
    const displayTime = getDisplayTimestamp();

    ctx.drawImage(video, 0, 0, canvas.width, 300);
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(0, 300, canvas.width, 120);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Arial";
    ctx.fillText("Dr. Shroff Charity Eye Hospital", 10, 320);
    ctx.fillText("📍 5027, Kadarnath Road, Daryaganj, Delhi - 110002", 10, 340);
    ctx.fillText(`Date & Time (IST): ${displayTime}`, 10, 360);
    ctx.fillText(`Latitude: ${latitude} | Longitude: ${longitude}`, 10, 380);

    const imageData = canvas.toDataURL("image/jpeg", 0.9);
    const filename = "Photo_" + timestamp + ".jpg";

    const div = document.createElement("div");
    div.className = "thumb";
    const img = document.createElement("img");
    img.src = imageData;
    div.appendChild(img);

    const status = document.createElement("div");
    status.className = "status not-uploaded";
    status.innerText = "⏳ Not Uploaded";
    div.appendChild(status);

    const btnGroup = document.createElement("div");
    btnGroup.className = "btn-group";

    const uploadBtn = document.createElement("button");
    uploadBtn.innerText = "Upload";
    uploadBtn.onclick = () => {
      const locationName = prompt("Enter Location/Room Name:");
      if (!locationName) {
        alert("Upload cancelled. Location name is required.");
        return;
      }
      fetch(imageData)
        .then(res => res.blob())
        .then(blob => {
          const formData = new FormData();
          formData.append("photo", blob, filename);
          formData.append("location", locationName);
          fetch("/api/upload", { method: "POST", body: formData })
            .then(res => res.text())
            .then(msg => {
              status.innerText = "✅ Uploaded to server";
              status.classList.remove("not-uploaded");
              status.classList.add("uploaded");
              console.log(msg);
            })
            .catch(err => {
              status.innerText = "❌ Upload Failed";
              console.error(err);
            });
        });
    };
    btnGroup.appendChild(uploadBtn);

    const saveBtn = document.createElement("button");
    saveBtn.innerText = "Save";
    saveBtn.onclick = () => {
      const link = document.createElement("a");
      link.href = imageData;
      link.download = filename;
      link.click();
    };
    btnGroup.appendChild(saveBtn);

    div.appendChild(btnGroup);
    previewList.prepend(div);
  }
</script>
</body>
</html>
