<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Dr. Shroff Charity Eye Hospital | Smart Photo Capture</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      margin: 0;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: #eef2f7;
      min-height: 100vh;
      height: auto;
    }

    .app-container {
      display: flex;
      flex: 1;
      flex-direction: row;
      min-height: 0;
      width: 100%;
      gap: 0;
    }

    /* Sidebar - Thumbnail panel */
    .sidebar {
      width: 240px;
      background: #ffffff;
      border-right: 1px solid rgba(0,0,0,0.1);
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 2px 0 8px rgba(0,0,0,0.02);
    }

    /* Main capture area - FULLY RESPONSIVE */
    .main {
      flex: 1;
      padding: 20px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #f8fafc;
      min-width: 0;
    }

    h2 {
      color: #1a3e60;
      font-size: clamp(1rem, 4vw, 1.6rem);
      font-weight: 600;
      margin-bottom: 0;
    }

    /* VIDEO CONTAINER - FULLY RESPONSIVE FRAME */
    .video-container {
      width: 100%;
      max-width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      border-radius: 24px;
      padding: 8px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
    }

    video {
      width: 100%;
      height: auto;
      max-width: 100%;
      border-radius: 20px;
      background-color: #000;
      display: block;
      object-fit: cover;
      border: 3px solid white;
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
      /* DYNAMIC ASPECT RATIO - maintains 4:3 but fills container */
      aspect-ratio: 4 / 3;
    }

    canvas {
      display: none;
    }

    .capture-btn {
      background: linear-gradient(95deg, #0077b6, #023e8a);
      color: white;
      padding: 14px 32px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: bold;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,119,182,0.3);
      transition: transform 0.1s ease, box-shadow 0.2s;
      width: auto;
      min-width: 180px;
      letter-spacing: 1px;
    }

    .capture-btn:active {
      transform: scale(0.97);
    }

    /* Thumbnail Styles */
    .thumb {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      transition: all 0.2s;
      border: 1px solid #e9ecef;
    }

    .thumb img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid #e2e8f0;
    }

    .status {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      padding: 8px 6px 4px;
    }

    .not-uploaded {
      color: #c2410c;
      background: #fff3e6;
    }

    .uploaded {
      color: #15803d;
      background: #e6f7ec;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      padding: 8px 10px 12px;
      justify-content: center;
    }

    .btn-group button {
      flex: 1;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 40px;
      background: #f1f5f9;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-group button:first-child {
      background: #1e6f3f;
      color: white;
    }

    .btn-group button:last-child {
      background: #334155;
      color: white;
    }

    .sidebar:empty::before {
      content: "📸 Captured photos will appear here";
      font-size: 13px;
      color: #6c757d;
      text-align: center;
      display: block;
      padding: 20px 10px;
    }

    /* 📱 RESPONSIVE: Mobile Layout */
    @media (max-width: 760px) {
      .app-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-top: 1px solid #e2e8f0;
        padding: 12px 16px;
        gap: 16px;
        min-height: 150px;
        order: 2;
      }

      .main {
        order: 1;
        padding: 16px;
      }

      .thumb {
        min-width: 120px;
        width: 120px;
        flex-shrink: 0;
      }

      .thumb img {
        aspect-ratio: 4/3;
      }

      .btn-group button {
        font-size: 10px;
        padding: 6px 0;
      }

      .capture-btn {
        padding: 12px 24px;
        min-width: 160px;
      }

      /* VIDEO FRAME on mobile - fills width perfectly */
      .video-container {
        padding: 6px;
      }
      
      video {
        aspect-ratio: 4 / 3;
        width: 100%;
      }
    }

    /* For very small phones */
    @media (max-width: 480px) {
      .main {
        padding: 12px;
      }
      
      .thumb {
        min-width: 105px;
        width: 105px;
      }
      
      .capture-btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
      
      h2 {
        font-size: 1.2rem;
      }
    }

    /* Landscape mode on mobile */
    @media (max-height: 550px) and (orientation: landscape) {
      .app-container {
        flex-direction: row;
      }
      
      .sidebar {
        width: 180px;
        flex-direction: column;
        overflow-y: auto;
      }
      
      .main {
        padding: 12px;
      }
      
      video {
        max-height: 70vh;
        width: auto;
        max-width: 100%;
      }
      
      .video-container {
        width: auto;
      }
    }

    footer {
      text-align: center;
      font-size: 10px;
      color: #6c757d;
      padding: 10px;
      background: white;
      border-top: 1px solid #e9ecef;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="sidebar" id="previewList"></div>
  <div class="main">
    <h2>📸 DR. SHROFF CHARITY EYE HOSPITAL</h2>
    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <button class="capture-btn" id="captureButton">📷 Capture Photo</button>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>
</div>
<footer>📍 5027, Kadarnath Road, Daryaganj, Delhi - 110002 | GPS enabled | Auto-adjusting camera frame</footer>

<script>
  (function() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const previewList = document.getElementById('previewList');
    const captureBtn = document.getElementById('captureButton');

    let latitude = "Not Available";
    let longitude = "Not Available";
    let cameraReady = false;

    // Set canvas size (fixed for consistent output quality)
    canvas.width = 400;
    canvas.height = 420;

    function getTimestamp() {
      const now = new Date();
      return new Intl.DateTimeFormat('en-IN', {
        timeZone: 'Asia/Kolkata',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      }).format(now).replace(/[,/: ]/g, "_").replace(/_+/g, "_");
    }

    function getDisplayTimestamp() {
      const now = new Date();
      return new Intl.DateTimeFormat('en-IN', {
        timeZone: 'Asia/Kolkata',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      }).format(now);
    }

    function getFreshLocation(callback) {
      if (!("geolocation" in navigator)) {
        callback(false);
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (position) => {
          latitude = position.coords.latitude.toFixed(6);
          longitude = position.coords.longitude.toFixed(6);
          callback(true);
        },
        (error) => {
          console.warn("Geolocation error:", error.message);
          let errorMsg = "";
          switch(error.code) {
            case error.PERMISSION_DENIED: 
              errorMsg = "Location permission denied. Please allow location access."; 
              break;
            case error.POSITION_UNAVAILABLE: 
              errorMsg = "Location unavailable. Enable GPS / High accuracy mode."; 
              break;
            case error.TIMEOUT: 
              errorMsg = "Location request timeout."; 
              break;
            default: errorMsg = error.message;
          }
          alert("⚠️ " + errorMsg + "\nPhoto will capture without GPS.");
          callback(false);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function performCapture() {
      if (!cameraReady || !video.videoWidth) {
        alert("Camera is not ready yet. Please wait.");
        return;
      }

      getFreshLocation(() => {
        finalizeCaptureImage();
      });
    }

    function finalizeCaptureImage() {
      const timestampRaw = getTimestamp();
      const displayTime = getDisplayTimestamp();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw video frame - maintain aspect ratio within 400x300 area
      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;
      let drawWidth = 400;
      let drawHeight = 300;
      let offsetX = 0, offsetY = 0;
      
      if (videoWidth && videoHeight) {
        const videoAspect = videoWidth / videoHeight;
        const targetAspect = 400 / 300;
        if (videoAspect > targetAspect) {
          drawHeight = 300;
          drawWidth = 300 * videoAspect;
          offsetX = (400 - drawWidth) / 2;
        } else {
          drawWidth = 400;
          drawHeight = 400 / videoAspect;
          offsetY = (300 - drawHeight) / 2;
        }
      }
      
      ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
      
      // Metadata overlay
      ctx.fillStyle = "rgba(0, 20, 40, 0.9)";
      ctx.fillRect(0, 300, canvas.width, 120);
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 12px 'Segoe UI'";
      ctx.fillText("🏥 Dr. Shroff Charity Eye Hospital", 12, 322);
      ctx.font = "10px 'Segoe UI'";
      ctx.fillText("📍 5027, Kadarnath Road, Daryaganj, Delhi - 110002", 12, 342);
      ctx.font = "11px monospace";
      ctx.fillText(`🕒 ${displayTime} IST`, 12, 362);
      
      let locationString = `🌐 Lat: ${latitude} | Lon: ${longitude}`;
      if (latitude === "Not Available") {
        locationString = "📍 Location: Not acquired (enable GPS)";
      }
      ctx.fillText(locationString, 12, 382);
      ctx.font = "9px italic";
      ctx.fillText("Clinical Photo Record", 12, 402);
      
      const imageData = canvas.toDataURL("image/jpeg", 0.92);
      const filename = "HOSPITAL_PHOTO_" + timestampRaw + ".jpg";
      
      // Create thumbnail
      const thumbDiv = document.createElement("div");
      thumbDiv.className = "thumb";
      
      const imgElement = document.createElement("img");
      imgElement.src = imageData;
      thumbDiv.appendChild(imgElement);
      
      const statusDiv = document.createElement("div");
      statusDiv.className = "status not-uploaded";
      statusDiv.innerText = "⏳ Not Uploaded";
      thumbDiv.appendChild(statusDiv);
      
      const btnGroup = document.createElement("div");
      btnGroup.className = "btn-group";
      
      const uploadBtn = document.createElement("button");
      uploadBtn.innerText = "☁️ Upload";
      uploadBtn.onclick = () => {
        const locationName = prompt("Enter Location/Room Name:", "General Ward");
        if (!locationName || locationName.trim() === "") {
          alert("Location name required.");
          return;
        }
        fetch(imageData)
          .then(res => res.blob())
          .then(blob => {
            const formData = new FormData();
            formData.append("photo", blob, filename);
            formData.append("location", locationName.trim());
            return fetch("/api/upload", { method: "POST", body: formData });
          })
          .then(async (response) => {
            if (response.ok) {
              statusDiv.innerText = "✅ Uploaded to server";
              statusDiv.classList.remove("not-uploaded");
              statusDiv.classList.add("uploaded");
            } else {
              throw new Error(`HTTP ${response.status}`);
            }
          })
          .catch(err => {
            console.error("Upload error:", err);
            statusDiv.innerText = "❌ Upload Failed";
            statusDiv.style.background = "#ffe6e5";
            statusDiv.style.color = "#b91c1c";
            alert("Upload failed. Image saved locally.");
          });
      };
      
      const saveBtn = document.createElement("button");
      saveBtn.innerText = "💾 Save";
      saveBtn.onclick = () => {
        const link = document.createElement("a");
        link.href = imageData;
        link.download = filename;
        link.click();
        statusDiv.innerText = "📁 Saved";
        setTimeout(() => {
          if (!statusDiv.classList.contains("uploaded")) {
            statusDiv.innerText = "⏳ Not Uploaded";
          }
        }, 1500);
      };
      
      btnGroup.appendChild(uploadBtn);
      btnGroup.appendChild(saveBtn);
      thumbDiv.appendChild(btnGroup);
      
      previewList.prepend(thumbDiv);
      
      // Auto-scroll on mobile
      if (window.innerWidth <= 760) {
        setTimeout(() => {
          previewList.scrollLeft = 0;
        }, 50);
      }
    }
    
    // Camera initialization with back camera
    function initCamera() {
      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: { exact: "environment" } } 
      })
        .then(stream => {
          video.srcObject = stream;
          return stream;
        })
        .catch(() => {
          return navigator.mediaDevices.getUserMedia({ video: true });
        })
        .then(stream => {
          if (stream && !video.srcObject) video.srcObject = stream;
          video.setAttribute("playsinline", true);
          video.play();
          video.onloadedmetadata = () => {
            cameraReady = true;
            console.log("Camera ready");
          };
        })
        .catch(err => {
          alert("Camera access denied. Please allow camera permissions.");
        });
    }
    
    // Update sidebar orientation based on screen width
    function updateSidebarOrientation() {
      if (window.innerWidth <= 760) {
        previewList.style.flexDirection = "row";
        previewList.style.flexWrap = "nowrap";
      } else {
        previewList.style.flexDirection = "column";
        previewList.style.flexWrap = "wrap";
      }
    }
    
    captureBtn.addEventListener('click', performCapture);
    initCamera();
    updateSidebarOrientation();
    window.addEventListener('resize', updateSidebarOrientation);
  })();
</script>
</body>
</html>
